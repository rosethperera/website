<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none" role="img" aria-labelledby="title desc">
<title>Carbon-Aware AI Scheduler visualization</title>
<desc>Generated from real carbon forecast and GPU profiling data in the project repository.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1c0d14"/>
    <stop offset="100%" stop-color="#090507"/>
  </linearGradient>
  <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a2f3e2"/>
    <stop offset="100%" stop-color="#6fd2bd"/>
  </linearGradient>
  <linearGradient id="warmLine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ffb7c1"/>
    <stop offset="100%" stop-color="#8b2134"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
  </filter>
</defs>
<rect x="0.75" y="0.75" width="1198.5" height="758.5" rx="24" fill="url(#bg)" stroke="rgba(198,166,171,0.16)"/>
<text x="90" y="110" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="34" font-weight="700">Emissions spread stays material across job lengths</text><text x="90" y="145" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="20">Using the same 2.5 kWh workload, even longer windows still benefit from carbon-aware timing.</text><text x="250" y="628" text-anchor="middle" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="22" font-weight="700">2h job</text><rect x="178" y="180.0" width="60" height="410.0" rx="20" fill="rgba(139,33,52,0.78)"/><rect x="262" y="300.5" width="60" height="289.5" rx="20" fill="rgba(111,210,189,0.95)"/><text x="208" y="168.0" text-anchor="middle" fill="#ffd5dc" font-family="Inter, Segoe UI, sans-serif" font-size="15">1548</text><text x="292" y="288.5" text-anchor="middle" fill="#d0f1e8" font-family="Inter, Segoe UI, sans-serif" font-size="15">1092</text><text x="250" y="676" text-anchor="middle" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="16">29.4% spread</text><text x="560" y="628" text-anchor="middle" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="22" font-weight="700">3h job</text><rect x="488" y="214.2" width="60" height="375.8" rx="20" fill="rgba(139,33,52,0.78)"/><rect x="572" y="292.2" width="60" height="297.8" rx="20" fill="rgba(111,210,189,0.95)"/><text x="518" y="202.2" text-anchor="middle" fill="#ffd5dc" font-family="Inter, Segoe UI, sans-serif" font-size="15">1418</text><text x="602" y="280.2" text-anchor="middle" fill="#d0f1e8" font-family="Inter, Segoe UI, sans-serif" font-size="15">1124</text><text x="560" y="676" text-anchor="middle" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="16">20.7% spread</text><text x="870" y="628" text-anchor="middle" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="22" font-weight="700">4h job</text><rect x="798" y="212.3" width="60" height="377.7" rx="20" fill="rgba(139,33,52,0.78)"/><rect x="882" y="279.5" width="60" height="310.5" rx="20" fill="rgba(111,210,189,0.95)"/><text x="828" y="200.3" text-anchor="middle" fill="#ffd5dc" font-family="Inter, Segoe UI, sans-serif" font-size="15">1426</text><text x="912" y="267.5" text-anchor="middle" fill="#d0f1e8" font-family="Inter, Segoe UI, sans-serif" font-size="15">1172</text><text x="870" y="676" text-anchor="middle" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="16">17.8% spread</text><text x="104" y="200" fill="#ffd5dc" font-family="Inter, Segoe UI, sans-serif" font-size="15">Worst</text><text x="104" y="224" fill="#d0f1e8" font-family="Inter, Segoe UI, sans-serif" font-size="15">Best</text><text x="104" y="250" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="15">gCO2</text>
</svg>