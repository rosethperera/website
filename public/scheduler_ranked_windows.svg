<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" fill="none" role="img" aria-labelledby="title desc">
<title>Top ranked schedule windows</title>
<desc>Generated from real project forecast and GPU profiling data.</desc>
<defs>
  <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1b1016"/>
    <stop offset="100%" stop-color="#0a0709"/>
  </linearGradient>
  <linearGradient id="accentFill" x1="0" y1="0" x2="0" y2="1">
