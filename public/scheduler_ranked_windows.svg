<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none" role="img" aria-labelledby="title desc">
<title>Carbon-Aware AI Scheduler visualization</title>
<desc>Generated from real carbon forecast and GPU profiling data in the project repository.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1c0d14"/>
    <stop offset="100%" stop-color="#090507"/>
  </linearGradient>
  <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a2f3e2"/>
    <stop offset="100%" stop-color="#6fd2bd"/>
  </linearGradient>
  <linearGradient id="warmLine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ffb7c1"/>
    <stop offset="100%" stop-color="#8b2134"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
  </filter>
</defs>
<rect x="0.75" y="0.75" width="1198.5" height="758.5" rx="24" fill="url(#bg)" stroke="rgba(198,166,171,0.16)"/>
<text x="90" y="110" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="34" font-weight="700">Top ranked schedule windows for a 2.5 kWh, 2 hour job</text><text x="90" y="145" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="20">The same workload produces meaningfully different emissions depending on when it starts.</text><rect x="850" y="88" width="258" height="110" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/><text x="876" y="126" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="16">Best vs worst valid 2h window</text><text x="876" y="172" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="34" font-weight="700">29.4% lower CO2</text><text x="90" y="204" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="20" font-weight="700">#1</text><text x="160" y="160" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="15">20:00 UTC to 22:00 UTC  |  avg 437.0 gCO2/kWh</text><rect x="160" y="170" width="870" height="54" rx="18" fill="rgba(255,255,255,0.035)"/><rect x="160" y="170" width="614.2" height="54" rx="18" fill="url(#accentLine)"/><text x="176" y="204" fill="#081114" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">1092.50 gCO2</text><text x="90" y="282" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="20" font-weight="700">#2</text><text x="160" y="238" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="15">05:00 UTC to 07:00 UTC  |  avg 442.5 gCO2/kWh</text><rect x="160" y="248" width="870" height="54" rx="18" fill="rgba(255,255,255,0.035)"/><rect x="160" y="248" width="621.9" height="54" rx="18" fill="url(#accentLine)"/><text x="176" y="282" fill="#081114" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">1106.25 gCO2</text><text x="90" y="360" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="20" font-weight="700">#3</text><text x="160" y="316" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="15">19:00 UTC to 21:00 UTC  |  avg 445.0 gCO2/kWh</text><rect x="160" y="326" width="870" height="54" rx="18" fill="rgba(255,255,255,0.035)"/><rect x="160" y="326" width="625.4" height="54" rx="18" fill="url(#accentLine)"/><text x="176" y="360" fill="#081114" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">1112.50 gCO2</text><text x="90" y="438" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="20" font-weight="700">#4</text><text x="160" y="394" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="15">15:00 UTC to 17:00 UTC  |  avg 454.0 gCO2/kWh</text><rect x="160" y="404" width="870" height="54" rx="18" fill="rgba(255,255,255,0.035)"/><rect x="160" y="404" width="638.1" height="54" rx="18" fill="url(#accentLine)"/><text x="176" y="438" fill="#081114" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">1135.00 gCO2</text><text x="90" y="516" fill="#f8f4f1" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="20" font-weight="700">#5</text><text x="160" y="472" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="15">04:00 UTC to 06:00 UTC  |  avg 473.0 gCO2/kWh</text><rect x="160" y="482" width="870" height="54" rx="18" fill="rgba(255,255,255,0.035)"/><rect x="160" y="482" width="664.8" height="54" rx="18" fill="url(#accentLine)"/><text x="176" y="516" fill="#081114" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">1182.50 gCO2</text><text x="160" y="640" fill="#b79fa4" font-family="Inter, Segoe UI, sans-serif" font-size="16">Worst valid window: 09:00 UTC to 11:00 UTC at 1547.50 gCO2</text><line x1="160" y1="670" x2="1030.0" y2="670" stroke="url(#warmLine)" stroke-width="10" stroke-linecap="round"/><text x="1046.0" y="676" fill="#ffd5dc" font-family="Inter, Segoe UI, sans-serif" font-size="16">Worst case reference</text>
</svg>